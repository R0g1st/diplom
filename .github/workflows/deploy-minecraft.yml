name: Deploy Minecraft Cluster

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          command -v wget >/dev/null 2>&1 || sudo apt-get update && sudo apt-get install -y wget unzip

          wget https://hashicorp-releases.yandexcloud.net/terraform/1.14.0/terraform_1.14.0_linux_amd64.zip
          sudo unzip -o terraform_1.14.0_linux_amd64.zip -d /usr/local/bin/
          rm terraform_1.14.0_linux_amd64.zip

          terraform version

      - name: Configure Terraform Mirror
        run: |
          cat <<EOF > ~/.terraformrc
          provider_installation {
            network_mirror {
              url = "https://terraform-mirror.mcs.mail.ru"
              include = ["registry.terraform.io/*/*"]
            }
            direct {
              exclude = ["registry.terraform.io/*/*"]
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
