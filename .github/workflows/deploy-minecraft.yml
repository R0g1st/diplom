name: Deploy Minecraft Cluster

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: self-hosted

    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          command -v wget >/dev/null 2>&1 || sudo apt-get update && sudo apt-get install -y wget unzip
          # Используем версию 1.10.0+ для стабильной работы, зеркало Яндекса
          wget https://yandexcloud.net
          sudo unzip -o terraform_1.10.5_linux_amd64.zip -d /usr/local/bin/
          rm terraform_1.10.5_linux_amd64.zip
          terraform version

      - name: Configure Terraform Mirror
        run: |
          cat <<EOF > ~/.terraformrc
          provider_installation {
            network_mirror {
              url = "https://terraform-mirror.mcs.mail.ru"
              include = ["registry.terraform.io/*/*"]
            }
            direct {
              exclude = ["registry.terraform.io/*/*"]
            }
          }
          EOF

      - name: Terraform Init
        run: terraform init

      # Шаг импорта исправлен: изменен ID правила и добавлена проверка состояния
      - name: Import existing minecraft security rule
        run: |
          # Проверяем, нет ли уже этого ресурса в стейте, чтобы не спамить ошибками
          if ! terraform state show openstack_networking_secgroup_rule_v2.minecraft >/dev/null 2>&1; then
            echo "Правило не найдено в state. Импортируем..."
            terraform import \
              openstack_networking_secgroup_rule_v2.minecraft \
              87bfd51f-2263-49c8-a300-71cde71aab6a || true
          else
            echo "Правило уже есть в state. Пропускаем импорт."
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
