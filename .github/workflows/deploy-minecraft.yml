name: Deploy Minecraft Cluster

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and Install Terraform from Mirror
        run: |
          # Проверяем, установлены ли unzip и wget. Если нет — ставим через sudo
          command -v wget >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && sudo -E apt-get update && sudo -E apt-get install -y wget)
          command -v unzip >/dev/null 2>&1 || (export DEBIAN_FRONTEND=noninteractive && sudo -E apt-get update && sudo -E apt-get install -y unzip)
          
          # Скачивание и установка
          wget https://hashicorp-releases.yandexcloud.net/terraform/1.14.0/terraform_1.14.0_linux_amd64.zip
          sudo -E unzip -o terraform_1.14.0_linux_amd64.zip -d /usr/local/bin/
          rm terraform_1.14.0_linux_amd64.zip
      
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Plan
        run: terraform plan
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform
