version: '3.8'

services:
  mc-server:
    image: itzg/minecraft-server
    container_name: mc-server
    restart: unless-stopped
    ports:
      - "25565:25565"
    volumes:
      - ~/minecraft-data:/data
    environment:
      EULA: "TRUE"
      ONLINE_MODE: "false"
      OVERRIDE_SERVER_PROPERTIES: "true"
      VERSION: "1.21.4"
      TYPE: "CUSTOM"
      MOTD: "Docker сервер 1.21.4"
      MEMORY: "4G"
      CUSTOM_SERVER_URL: "https://piston-data.mojang.com/v1/objects/4707d00eb834b446575d89a61a11b5d548d8c001/server.jar"
