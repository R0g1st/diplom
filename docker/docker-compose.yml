version: "3.8"

services:
  mc-server:
    image: itzg/minecraft-server
    container_name: mc-server
    restart: unless-stopped

    ports:
      - "25565:25565"

    volumes:
      - /opt/minecraft/data:/data

    environment:
      EULA: "TRUE"
      ONLINE_MODE: "false"

      TYPE: "CUSTOM"
      CUSTOM_SERVER: "/data/server.jar"

      MEMORY: "4G"
      MOTD: "Minecraft Cluster 1.21.4"

      SKIP_DOWNLOAD_DEFAULTS: "true"

    stdin_open: true
    tty: true
